<svg width="510" height="190" viewBox="0 0 510 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>PicBop Header Mark</title>
  <desc>Compact transparent lockup for the in-app header: mini card-stack glyph tight against the wordmark with pink swipe underline.</desc>
