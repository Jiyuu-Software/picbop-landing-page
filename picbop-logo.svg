      <rect x="19" y="19" width="72" height="72" rx="8" fill="#FF3D8B" opacity="0.18"/>
      <circle cx="39" cy="42" r="9" fill="#FF3D8B"/>
      <path d="M26 86L50 60L63 73L74 62L84 86" stroke="#211C17" stroke-width="7"
